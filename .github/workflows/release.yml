name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: package
        run: bun install

      - name: Build binaries
        working-directory: package
        run: |
          mkdir -p dist

          bun build src/index.ts --compile --target bun-linux-x64    --outfile dist/lumine
          cd dist && zip lumine-linux-x86_64.zip    lumine   && rm lumine   && cd ..

          bun build src/index.ts --compile --target bun-linux-arm64  --outfile dist/lumine
          cd dist && zip lumine-linux-aarch64.zip   lumine   && rm lumine   && cd ..

          bun build src/index.ts --compile --target bun-darwin-x64   --outfile dist/lumine
          cd dist && zip lumine-macos-x86_64.zip    lumine   && rm lumine   && cd ..

          bun build src/index.ts --compile --target bun-darwin-arm64 --outfile dist/lumine
          cd dist && zip lumine-macos-aarch64.zip   lumine   && rm lumine   && cd ..

          bun build src/index.ts --compile --target bun-windows-x64  --outfile dist/lumine.exe
          cd dist && zip lumine-windows-x86_64.zip  lumine.exe && rm lumine.exe && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: package/dist/*.zip
          generate_release_notes: true
